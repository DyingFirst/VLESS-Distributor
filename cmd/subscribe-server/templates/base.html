{{ define "html_head" }}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ template "page_title" . }}Subscribe Server</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; line-height: 1.5; }
  nav { background: #1a1a2e; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  nav a { color: #e0e0e0; text-decoration: none; font-size: 14px; }
  nav a:hover { color: #fff; }
  nav .brand { font-weight: 700; color: #fff; font-size: 16px; margin-right: auto; }
  nav form { display: inline; }
  nav button { background: none; border: none; color: #e0e0e0; cursor: pointer; font-size: 14px; }
  nav button:hover { color: #fff; }
  main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 22px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
  th { background: #fafafa; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  form.inline { display: inline; }
  form.card, .card { background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 16px; }
  label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 500; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
  input:focus, select:focus { outline: none; border-color: #4a90d9; }
  button, .btn { display: inline-block; padding: 8px 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
  button:hover, .btn:hover { background: #16213e; }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #a93226; }
  .error { color: #c0392b; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat { background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; }
  .stat .num { font-size: 32px; font-weight: 700; }
  .stat .label { font-size: 13px; color: #888; }
  .mono { font-family: "SF Mono", Monaco, "Cascadia Code", monospace; font-size: 13px; }
  .sub-link { font-size: 12px; word-break: break-all; display: inline-block; max-width: 240px; vertical-align: middle; }
  .copy-btn { padding: 4px 10px; font-size: 12px; vertical-align: middle; margin-left: 6px; }
  .copy-btn.copied { background: #27ae60; }
</style>
<script>
function copyLink(btn) {
  var link = btn.getAttribute('data-link');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(link).then(function() { showCopied(btn); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = link;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  }
}
function showCopied(btn) {
  var orig = btn.textContent;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = orig;
    btn.classList.remove('copied');
  }, 1500);
}
</script>
</head>
<body>
<nav>
  <a href="/admin/" class="brand">Subscribe Server</a>
  <a href="/admin/users">Users</a>
  <a href="/admin/servers">Servers</a>
  <form method="post" action="/admin/logout"><button>Logout</button></form>
</nav>
<main>
{{ end }}

{{ define "html_foot" }}
</main>
</body>
</html>
{{ end }}
