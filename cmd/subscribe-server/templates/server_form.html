{{ template "html_head" . }}

<h1>New Server</h1>
<form class="card" method="post" action="/admin/servers">
  <label>VLESS Sharelink</label>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input type="text" id="sharelink" placeholder="vless://uuid@host:port?...#name" style="margin-bottom:0">
    <button type="button" onclick="importSharelink()" style="white-space:nowrap">Import</button>
  </div>

  <label>Name</label>
  <input type="text" name="name" required>

  <label>Host</label>
  <input type="text" name="host" required placeholder="us1.example.com">

  <label>Port</label>
  <input type="number" name="port" required value="443" min="1" max="65535">

  <label>Security</label>
  <select name="security">
    <option value="tls">TLS</option>
    <option value="reality">Reality</option>
    <option value="none">None</option>
  </select>

  <label>Transport</label>
  <select name="transport">
    <option value="tcp">TCP</option>
    <option value="ws">WebSocket</option>
    <option value="grpc">gRPC</option>
    <option value="httpupgrade">HTTPUpgrade</option>
  </select>

  <label>SNI</label>
  <input type="text" name="sni" placeholder="example.com">

  <label>Fingerprint</label>
  <input type="text" name="fingerprint" placeholder="chrome">

  <label>Flow</label>
  <input type="text" name="flow" placeholder="xtls-rprx-vision">

  <label>Path (ws/httpupgrade)</label>
  <input type="text" name="path" placeholder="/ws">

  <label>Host Header (ws/httpupgrade)</label>
  <input type="text" name="host_header">

  <label>Public Key (Reality)</label>
  <input type="text" name="pbk">

  <label>Short ID (Reality)</label>
  <input type="text" name="sid">

  <label>Service Name (gRPC)</label>
  <input type="text" name="service_name">

  <button type="submit">Create Server</button>
  <a href="/admin/servers" class="btn" style="background:#888">Cancel</a>
</form>

<script>
function importSharelink() {
  var raw = document.getElementById('sharelink').value.trim();
  if (!raw) return;

  var u;
  try {
    u = new URL(raw);
  } catch(e) {
    alert('Invalid VLESS link');
    return;
  }

  if (u.protocol !== 'vless:') {
    alert('Not a VLESS link');
    return;
  }

  var p = u.searchParams;

  function setVal(name, val) {
    var el = document.querySelector('[name="' + name + '"]');
    if (!el) return;
    if (el.tagName === 'SELECT') {
      for (var i = 0; i < el.options.length; i++) {
        if (el.options[i].value === val) { el.selectedIndex = i; break; }
      }
    } else {
      el.value = val;
    }
  }

  setVal('name', decodeURIComponent(u.hash.substring(1)));
  setVal('host', u.hostname);
  setVal('port', u.port || '443');
  setVal('security', p.get('security') || 'tls');
  setVal('transport', p.get('type') || 'tcp');
  setVal('sni', p.get('sni') || '');
  setVal('fingerprint', p.get('fp') || '');
  setVal('flow', p.get('flow') || '');
  setVal('path', p.get('path') || '');
  setVal('host_header', p.get('host') || '');
  setVal('pbk', p.get('pbk') || '');
  setVal('sid', p.get('sid') || '');
  setVal('service_name', p.get('serviceName') || '');
}
</script>

{{ template "html_foot" . }}
